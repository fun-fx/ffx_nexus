# Fast checks on every push and pull request.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [[ -n "$unformatted" ]]; then
            echo "gofmt needed on:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: go build
        run: |
          go build -o bin/nexus ./cmd/nexus
          go build -o bin/nexus-evalbatch ./cmd/nexus-evalbatch

  eval-service:
    name: Eval service (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eval-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: eval-service/requirements-test.txt

      - name: Install test deps
        run: pip install -r requirements-test.txt

      - name: pytest
        run: python -m pytest -q

  web:
    name: Web dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: npm ci
        run: npm ci

      - name: npm build
        run: npm run build
