# Continuous deployment for prod (Talos + Cozystack, namespace tenant-nexus).
#
# Single-push-to-main flow (modeled on the proven fun-fx/ffx_web pipeline):
#   1. An in-cluster kaniko Job builds the image. An initContainer clones the
#      repo at this commit using the ephemeral Actions token, drops the source
#      into a shared emptyDir, and kaniko builds that LOCAL context (no git://
#      clone inside kaniko, so no PAT is needed). The image is pushed to the
#      LAN Harbor host (harbor.192.168.0.101.nip.io) — the same host the nodes
#      already pull from — under an IMMUTABLE git-SHA tag (+ a convenience
#      `main-latest`).
#   2. helm upgrade --install pins image.tag to that SHA, so the Deployment
#      spec changes every push and Kubernetes rolls automatically (no force
#      restart, no floating-tag cache ambiguity).
#   3. In-cluster smoke probes (gateway :8080/healthz, console :8081/healthz).
#
# Why this shape:
#   - The ARC runner image has no docker/buildx, so the build runs in-cluster.
#   - The initContainer clone pattern means kaniko never authenticates to
#     GitHub itself; the short-lived `github.token` is enough (matches ffx_web).
#   - Pushing/pulling on the LAN host reuses the existing `harbor` secret, so
#     no extra push secret or host remap is required.
#
# Required GitHub secret:
#   PROD_KUBECONFIG_B64 — base64 kubeconfig with rights on the prod cluster.
#
# Concurrency: serial on main so a fast follow-up push doesn't roll an
# in-progress upgrade back; in-flight runs finish first.
name: CD (prod)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-prod-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: harbor.192.168.0.101.nip.io
  IMAGE: ffx/nexus
  NAMESPACE: tenant-nexus

jobs:
  cd:
    name: Build + deploy (tenant-nexus)
    # ARC scale set "self-hosted" (org-level fun-fx, Default group). ARC matches
    # a single label equal to the scale-set name, so plain `self-hosted` is the
    # correct form (verified: fun-fx/ffx_web uses the same and succeeds).
    # NOTE: org self-hosted runners are blocked for PUBLIC repos by default, so
    # this repo must stay PRIVATE for CD to be picked up.
    runs-on: self-hosted
    timeout-minutes: 25
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # The ARC runner image ships without kubectl, so install it explicitly
      # (azure/setup-helm below handles helm). Pinned to a stable channel.
      - name: Install kubectl
        run: |
          set -euo pipefail
          KVER="$(curl -fsSL https://dl.k8s.io/release/stable.txt)"
          curl -fsSLo /tmp/kubectl "https://dl.k8s.io/release/${KVER}/bin/linux/amd64/kubectl"
          chmod +x /tmp/kubectl
          if sudo -n mv /tmp/kubectl /usr/local/bin/kubectl 2>/dev/null; then
            :
          else
            mkdir -p "$HOME/.local/bin"
            mv /tmp/kubectl "$HOME/.local/bin/kubectl"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.local/bin:$PATH"
          fi
          kubectl version --client=true

      - name: Configure kubectl
        run: |
          mkdir -p "$RUNNER_TEMP/kube"
          echo "${{ secrets.PROD_KUBECONFIG_B64 }}" | base64 -d > "$RUNNER_TEMP/kube/config"
          echo "KUBECONFIG=$RUNNER_TEMP/kube/config" >> "$GITHUB_ENV"
          kubectl --kubeconfig "$RUNNER_TEMP/kube/config" version --client=true

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      # Step 1 of 3: build the image in-cluster with kaniko. An initContainer
      # clones THIS commit via x-access-token + the ephemeral Actions token into
      # a shared emptyDir; kaniko then builds that local context and pushes to
      # the LAN Harbor host using the existing `harbor` pull/push secret.
      # Immutable git-SHA tag + a floating `main-latest` for convenience.
      - name: Build & push image (kaniko in-cluster)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SHA="${GITHUB_SHA}"
          JOB_NAME="nexus-build-${SHA::7}"
          echo "JOB_NAME=$JOB_NAME" >> "$GITHUB_ENV"
          echo "IMAGE_SHA=${REGISTRY}/${IMAGE}:${SHA}" >> "$GITHUB_ENV"

          # Short-lived git credential for the clone initContainer.
          kubectl -n "$NAMESPACE" create secret generic kaniko-git-creds \
            --from-literal=.git-credentials="https://x-access-token:${GH_TOKEN}@github.com" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Drop any previous build job of the same name (re-run safety).
          kubectl -n "$NAMESPACE" delete job "$JOB_NAME" --ignore-not-found

          cat <<EOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${JOB_NAME}
            namespace: ${NAMESPACE}
          spec:
            backoffLimit: 0
            ttlSecondsAfterFinished: 600
            template:
              spec:
                restartPolicy: Never
                initContainers:
                  - name: clone
                    image: alpine/git:latest
                    command:
                      - /bin/sh
                      - -c
                      - |
                        set -e
                        git config --global credential.helper store
                        cp /git-creds/.git-credentials ~/.git-credentials
                        git clone --depth=1 https://github.com/${GITHUB_REPOSITORY}.git /workspace
                        cd /workspace && git fetch --depth=1 origin ${SHA} && git checkout ${SHA}
                        echo "cloned ${GITHUB_REPOSITORY} at ${SHA}"
                    volumeMounts:
                      - name: workspace
                        mountPath: /workspace
                      - name: git-creds
                        mountPath: /git-creds
                        readOnly: true
                containers:
                  - name: kaniko
                    image: gcr.io/kaniko-project/executor:latest
                    args:
                      - --dockerfile=/workspace/Dockerfile
                      - --context=/workspace
                      - --destination=${REGISTRY}/${IMAGE}:${SHA}
                      - --destination=${REGISTRY}/${IMAGE}:main-latest
                      - --skip-tls-verify
                      - --cache=false
                    resources:
                      requests:
                        cpu: "1"
                        memory: 2Gi
                      limits:
                        cpu: "2"
                        memory: 4Gi
                    volumeMounts:
                      - name: workspace
                        mountPath: /workspace
                      - name: docker-config
                        mountPath: /kaniko/.docker
                        readOnly: true
                volumes:
                  - name: workspace
                    emptyDir: {}
                  - name: git-creds
                    secret:
                      secretName: kaniko-git-creds
                  - name: docker-config
                    secret:
                      secretName: harbor
                      items:
                        - key: .dockerconfigjson
                          path: config.json
          EOF

          # Poll for a terminal state. `kubectl wait --for=condition=complete`
          # never returns on a Failed job, so a broken build would hang for the
          # full timeout — poll both conditions and bail the moment it fails.
          echo "waiting for build job ${JOB_NAME} (timeout 600s)"
          deadline=$(( $(date +%s) + 600 ))
          phase=""
          while :; do
            if kubectl -n "$NAMESPACE" get job "$JOB_NAME" \
                -o 'jsonpath={.status.conditions[?(@.type=="Complete")].status}' 2>/dev/null | grep -q True; then
              phase="complete"; break
            fi
            if kubectl -n "$NAMESPACE" get job "$JOB_NAME" \
                -o 'jsonpath={.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null | grep -q True; then
              phase="failed"; break
            fi
            if (( $(date +%s) >= deadline )); then phase="timeout"; break; fi
            sleep 5
          done

          if [[ "$phase" != "complete" ]]; then
            echo "::error::kaniko build ${phase}"
            kubectl -n "$NAMESPACE" logs "job/${JOB_NAME}" -c clone --tail=40 || true
            kubectl -n "$NAMESPACE" logs "job/${JOB_NAME}" -c kaniko --tail=80 || true
            exit 1
          fi
          echo "build OK: ${REGISTRY}/${IMAGE}:${SHA}"

      - name: Helm dependency build
        run: |
          if [[ -f deploy/helm/nexus/Chart.yaml ]]; then
            helm dependency build deploy/helm/nexus
          fi

      # Step 2 of 3: helm upgrade pinned to the immutable SHA tag. Because the
      # tag changes every push, the Deployment spec changes and Kubernetes rolls
      # automatically — no force restart needed.
      - name: Helm upgrade --install
        run: |
          set -euo pipefail
          helm upgrade --install nexus deploy/helm/nexus \
            --namespace "$NAMESPACE" \
            --create-namespace \
            -f deploy/cozystack/values-prod.yaml \
            --set image.repository="${REGISTRY}/${IMAGE}" \
            --set image.tag="${GITHUB_SHA}" \
            --wait \
            --timeout 5m

      - name: Wait for rollout
        run: |
          kubectl -n "$NAMESPACE" rollout status deploy/nexus --timeout=180s

      # Step 3 of 3: smoke. ARC runner lives inside the cluster (not on
      # Tailscale), so it cannot resolve *.ts.net public FQDNs. Probe the
      # freshly-rolled app from inside its own pod instead.
      - name: Smoke
        run: |
          set -euo pipefail
          for endpoint in "8080:gateway" "8081:console"; do
            port="${endpoint%%:*}"; name="${endpoint##*:}"
            code=$(kubectl -n "$NAMESPACE" exec deploy/nexus -- \
              wget -q -O /dev/null -S "http://localhost:${port}/healthz" 2>&1 \
              | awk '/HTTP\// {print $2; exit}')
            echo "$name ($port) -> ${code:-no-response}"
            if [[ "$code" != "200" ]]; then
              echo "::error::health check failed: ${name} :${port}/healthz -> ${code:-no-response}"
              exit 1
            fi
          done

      - name: Post-run status
        if: always()
        run: |
          kubectl -n "$NAMESPACE" get deploy,po -l app.kubernetes.io/name=nexus -o wide
