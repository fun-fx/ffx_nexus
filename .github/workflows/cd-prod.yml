# Continuous deployment for prod (Talos + Cozystack, namespace tenant-nexus).
#
# Single-push-to-main flow:
#   1. Build a fresh image from refs/heads/main via kaniko in-cluster, pushing
#      to harbor.<tailnet>.ts.net/ffx/nexus:main-latest. This tag is the
#      floating one — every main push rebuilds it.
#   2. Helm upgrade --install using deploy/cozystack/values-prod.yaml, which
#      pins image.tag to `main-latest` so the chart rolls to the new image.
#   3. In-cluster smoke probes (gateway :8080/healthz, console :8081/healthz).
#
# Why floating tag:
#   Pulling the build out of the CI runner (the runner image doesn't even have
#   docker/buildx) and into the cluster (where kaniko already works against
#   the in-cluster Harbor with the existing `harbor` pull-secret) keeps CD
#   one click: `git push origin main`.
#
# Required GitHub secret:
#   PROD_KUBECONFIG_B64 — base64-encoded kubeconfig with admin rights on the
#                         prod cluster (Tailscale endpoint, OIDC aside).
#                         Used by every step in this job.
#
# Concurrency: serial on main so a fast follow-up push doesn't roll an
# in-progress upgrade back. `cancel-in-progress: false` matches a deployment
# cadence where each push wins over the previous; in-flight runs finish first.
name: CD (prod)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-prod-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  cd:
    name: Build + deploy (tenant-nexus)
    # ARC scale set "self-hosted" (org-level fun-fx, Default group). ARC matches
    # a single label equal to the scale-set name, so plain `self-hosted` is the
    # correct form (verified: fun-fx/ffx_web uses the same and succeeds).
    # NOTE: org self-hosted runners are blocked for PUBLIC repos by default, so
    # this repo must stay PRIVATE for CD to be picked up.
    runs-on: self-hosted
    timeout-minutes: 25
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # The ARC runner image ships without kubectl, so install it explicitly
      # (azure/setup-helm below handles helm). Pinned to a stable channel.
      - name: Install kubectl
        run: |
          set -euo pipefail
          KVER="$(curl -fsSL https://dl.k8s.io/release/stable.txt)"
          curl -fsSLo /tmp/kubectl "https://dl.k8s.io/release/${KVER}/bin/linux/amd64/kubectl"
          chmod +x /tmp/kubectl
          if sudo -n mv /tmp/kubectl /usr/local/bin/kubectl 2>/dev/null; then
            :
          else
            mkdir -p "$HOME/.local/bin"
            mv /tmp/kubectl "$HOME/.local/bin/kubectl"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.local/bin:$PATH"
          fi
          kubectl version --client=true

      - name: Configure kubectl
        run: |
          mkdir -p "$RUNNER_TEMP/kube"
          echo "${{ secrets.PROD_KUBECONFIG_B64 }}" | base64 -d > "$RUNNER_TEMP/kube/config"
          echo "KUBECONFIG=$RUNNER_TEMP/kube/config" >> "$GITHUB_ENV"
          kubectl --kubeconfig "$RUNNER_TEMP/kube/config" version --client=true

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      # kaniko pushes to the Tailscale host (harbor.<tailnet>.ts.net) but the
      # default `harbor` pull-secret's auth entry is keyed by the LAN host
      # (…nip.io), which kaniko can't match for that push. Derive a host-correct
      # copy keyed by the ts.net host so the push authenticates. Idempotent:
      # re-applied every run so the secret survives namespace resets.
      - name: Ensure harbor-push secret (ts.net host)
        run: |
          set -euo pipefail
          cfg="$(kubectl -n tenant-nexus get secret harbor \
            -o jsonpath='{.data.\.dockerconfigjson}' | base64 -d \
            | python3 -c '
import json,sys
d=json.load(sys.stdin)
src=next(iter(d["auths"].values()))
print(json.dumps({"auths":{"harbor.<tailnet>.ts.net":src}}))')"
          kubectl -n tenant-nexus create secret generic harbor-push \
            --type=kubernetes.io/dockerconfigjson \
            --from-literal=.dockerconfigjson="$cfg" \
            --dry-run=client -o yaml | kubectl apply -f -

      # Step 1 of 3: build a fresh image in-cluster. The kaniko Job clones
      # github.com/fun-fx/ffx_nexus at refs/heads/main via HTTPS and pushes
      # the resulting image to harbor.<tailnet>.ts.net under the floating
      # `main-latest` tag. The repo is PRIVATE, so we hand kaniko the
      # ephemeral GITHUB_TOKEN exposed by Actions. The basic-auth USERNAME
      # for an Actions token MUST be the literal `x-access-token` — GitHub
      # rejects (github.actor + app-token) with "Password authentication is
      # not supported". Kaniko reads GIT_USERNAME / GIT_TOKEN from env when
      # --context starts with `git://`. The push itself is authenticated by
      # the in-cluster `harbor-push` secret mounted by the Job.
      - name: Build image (kaniko in-cluster)
        env:
          GIT_USERNAME: x-access-token
          GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: main-latest
          NAMESPACE: tenant-nexus
        run: |
          set -euo pipefail
          chmod +x deploy/cozystack/kaniko-build.sh
          ./deploy/cozystack/kaniko-build.sh

      - name: Helm dependency build
        run: |
          if [[ -f deploy/helm/nexus/Chart.yaml ]]; then
            helm dependency build deploy/helm/nexus
          fi

      # Step 2 of 3: helm upgrade. With image.tag floating to `main-latest`,
      # the chart always pulls in the just-built image.
      - name: Helm upgrade --install
        run: |
          set -euo pipefail
          helm upgrade --install nexus deploy/helm/nexus \
            --namespace tenant-nexus \
            --create-namespace \
            -f deploy/cozystack/values-prod.yaml \
            --wait \
            --timeout 5m

      # The image tag is floating (`main-latest`), so helm upgrade leaves the
      # Deployment spec byte-identical across pushes and would NOT restart any
      # pod even though the image digest changed. Force a rollout so the new
      # `main-latest` (pullPolicy: Always) is actually pulled.
      - name: Force rollout (floating tag)
        run: |
          kubectl -n tenant-nexus rollout restart deploy/nexus

      - name: Wait for rollout
        run: |
          kubectl -n tenant-nexus rollout status deploy/nexus --timeout=180s

      # Step 3 of 3: smoke. ARC runner lives inside the cluster (not on
      # Tailscale), so it cannot resolve *.ts.net public FQDNs. Probe the
      # freshly-rolled app from inside its own pod instead.
      - name: Smoke
        run: |
          set -euo pipefail
          for endpoint in "8080:gateway" "8081:console"; do
            port="${endpoint%%:*}"; name="${endpoint##*:}"
            code=$(kubectl -n tenant-nexus exec deploy/nexus -- \
              wget -q -O /dev/null -S "http://localhost:${port}/healthz" 2>&1 \
              | awk '/HTTP\// {print $2; exit}')
            echo "$name ($port) -> ${code:-no-response}"
            if [[ "$code" != "200" ]]; then
              echo "::error::health check failed: ${name} :${port}/healthz -> ${code:-no-response}"
              exit 1
            fi
          done

      - name: Post-run status
        if: always()
        run: |
          kubectl -n tenant-nexus get deploy,po -l app.kubernetes.io/name=nexus -o wide
