# Prometheus scrape config for the local Nexus dev stack.
# Scrapes the in-cluster gateway (:8080) and console (:8081) over the
# compose network. Both services expose /metrics once the observability
# adapter is compiled in.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: nexus-gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - "nexus:9101"
        labels:
          service: gateway

  - job_name: nexus-console
    metrics_path: /metrics
    static_configs:
      - targets:
          - "nexus:8081"
        labels:
          service: console

  - job_name: prometheus
    static_configs:
      - targets:
          - "localhost:9090"
