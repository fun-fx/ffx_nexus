# OTLP receiver → Prometheus remote_write + debug exporter.
#
# This is the optional open-core path: every `gen_ai.*` trace Nexus emits
# lands as an OpenTelemetry resource (via internal/observability.MultiRecorder
# + the OTLP exporter), and the collector forwards them to Prometheus, Loki,
# Tempo, Jaeger, Honeycomb, etc. — without Nexus caring which backend the
# operator chose. See ../docker-compose.yml#observability profile.
#
# Wire format: Nexus emits an OTLP/HTTP+JSON `ExportTraceServiceRequest`
# envelope (`{"resourceSpans":[ { "resource":..., "scope_spans":[ { "scope":..., "spans":[...] } ] } ]}`).
# The receiver on :4318 unmarshals it as Protobuf JSON; this is what
# the OTLP spec designates for cross-process trace ingestion, and what
# the `otlptracehttp` exporter emits at any other site (libraries,
# agents, gateway proxies). Operators do not need to do anything here.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s

exporters:
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
  debug:
    verbosity: detailed

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheusremotewrite]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
