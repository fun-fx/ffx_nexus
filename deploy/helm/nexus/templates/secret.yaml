{{- if not .Values.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nexus.fullname" . }}
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.geminiApiKey }}
  GEMINI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.masterKey }}
  NEXUS_MASTER_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.judgeApiKey }}
  NEXUS_JUDGE_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.embeddingsApiKey }}
  NEXUS_EMBEDDINGS_API_KEY: {{ . | quote }}
  {{- end }}
  {{- if and .Values.dependencies.postgres.enabled .Values.dependencies.postgres.url }}
  NEXUS_POSTGRES_URL: {{ .Values.dependencies.postgres.url | quote }}
  {{- end }}
  {{- if and .Values.dependencies.clickhouse.enabled .Values.dependencies.clickhouse.url }}
  NEXUS_CLICKHOUSE_URL: {{ .Values.dependencies.clickhouse.url | quote }}
  {{- end }}
  {{- if and .Values.dependencies.redis.enabled .Values.dependencies.redis.url }}
  NEXUS_REDIS_URL: {{ .Values.dependencies.redis.url | quote }}
  {{- end }}
{{- end -}}
