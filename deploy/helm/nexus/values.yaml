# Default values for the Nexus Helm chart.
# Out of the box this deploys the gateway + console in zero-dependency mode
# (no Postgres/ClickHouse/Redis). Enable the dependency sections below to wire
# the control plane, trace persistence, rate limiting, and semantic cache.

replicaCount: 1

image:
  repository: ghcr.io/fun-fx/ffx_nexus
  # Defaults to .Chart.AppVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Ports the nexus binary listens on. These must match config.gatewayAddr /
# config.consoleAddr below (the chart keeps them in sync via the ConfigMap).
ports:
  gateway: 8080
  console: 8081

service:
  type: ClusterIP
  annotations: {}
  # Optional fixed cluster IP / loadBalancer settings can be added per-env.

# --- Non-secret configuration (rendered into a ConfigMap as NEXUS_* env) ---
# Only set what you need; empty values are omitted so the binary's own defaults
# apply. Secrets (provider keys, master key, DB DSNs) go under `secrets:` below.
config:
  gatewayAddr: ":8080"
  consoleAddr: ":8081"
  upstreamTimeout: "120s"
  openaiBaseUrl: ""

  # BYOK / multi-tenancy: how upstream provider keys are resolved per request.
  # "shared" (default) uses org/env keys for everyone; "byok" prefers each
  # caller's own stored key (falling back to org -> env); "strict_byok" requires
  # a per-user key. byok modes need Postgres + secrets.masterKey.
  keyMode: "shared"

  # Public self-service signup at POST /api/auth/register (member role only).
  allowSignup: false

  # Quality-aware routing (Phase 4). Requires ClickHouse for live quality stats.
  routeGroups: ""
  routeWQuality: ""
  routeWCost: ""
  routeWLatency: ""
  routeWindow: ""
  routeRefresh: ""
  routeLoadBalance: false

  # Inline guardrails (hot-path policy checks; no datastore needed).
  guardrails:
    enabled: false
    blockPiiInput: false
    redactPiiOutput: false
    maxInputChars: 0
    denyPatterns: ""
    validateJsonOutput: false

  # Structured-output self-correction (requires guardrails.validateJsonOutput).
  selfCorrection:
    enabled: false
    maxRetries: 1

  # Local SLM judge for async evals (OpenAI-compatible inference server).
  judge:
    baseUrl: ""
    model: ""
    sampleRate: ""
    workers: ""

  # External Python eval sidecar (DeepEval/RAGAS).
  evalService:
    url: ""
    metrics: ""
    timeout: ""

  # Semantic cache (requires Redis + an embeddings endpoint).
  semanticCache:
    enabled: false
    ttl: "24h"
    threshold: "0.92"
    maxEntries: 500
  embeddings:
    url: ""
    model: ""
    timeout: "5s"

  # --- Observability adapter toggle (V3) -----------------------------------
  # Each setting below independently opts nexus into one adapter; leaving
  # any of them off keeps the zero-dep fast path. The adapters are
  # independent: a ClickHouse outage doesn't disable the OTLP exporter, a
  # Prometheus scrape misconfig doesn't disable CH trace persistence.
  otlp:
    # master toggle. Endpoint must be a full OTLP/HTTP URL the binary
    # can POST to (e.g. http://otel-collector.observability.svc:4318/v1/traces
    # or https://api.honeycomb.io/v1/traces).
    enabled: false
    endpoint: ""
  # NEXUS_METRICS_ADDR exposes a Prometheus /metrics endpoint on the
  # gateway and console. Empty (default) means no scrape surface.
  metricsAddr: ""

  # --- V4 failover alert sinks --------------------------------------------
  # Both URLs are independently opt-in; empty means "no goroutine, no DNS".
  # The literal noop notifier (`internal/router/notifier.go`) is wired so
  # the gateway stays metric-only when these are blank. Set BOTH (or one)
  # in production so a primary going bad lights up the channel you actually
  # read on a Saturday morning.
  failoverWebhook: ""           # NEXUS_FAILOVER_WEBHOOK — generic JSON POST
  failoverSlack: ""             # NEXUS_FAILOVER_SLACK_WEBHOOK
  failoverAlertCooldown: 0s     # NEXUS_FAILOVER_ALERT_COOLDOWN; 0 = off

  # --- Metabase BI adapter (mirror of the V3 OTLP toggle) --------------------
  # Empty url means the adapter is fully off — NewMetabaseBootstrapper returns
  # nil, no goroutines, no DNS, no boot network calls. Set the URL to point at
  # a Metabase instance (the `metabase` service in deploy/docker-compose.yml's
  # `bi` profile fits; `http://metabase.observability.svc.cluster.local:3000`
  # works in cluster). The bootstrap is one-shot and idempotent — credentials
  # change by re-deploying Nexus, never a side-effect during request handling.
  metabase:
    url: ""                       # NEXUS_METABASE_URL
    user: ""                      # NEXUS_METABASE_USER
    password: ""                  # NEXUS_METABASE_PASSWORD
    clickhouseUrl: ""             # NEXUS_METABASE_CLICKHOUSE_URL (http://host:8123?database=...)
    postgresUrl: ""               # NEXUS_METABASE_POSTGRES_URL (postgres://...)
    seedDir: ""                   # NEXUS_METABASE_SEED_DIR (optional)
    healthTimeout: "90s"          # NEXUS_METABASE_HEALTH_TIMEOUT
    requestTimeout: "10s"         # NEXUS_METABASE_REQUEST_TIMEOUT

  # --- V5 high-concurrency tuning ---------------------------------------------
  # These map directly to the Go runtime env vars GOMEMLIMIT and GOGC. Set
  # `gomemlimit` to roughly `0.85 * container.limits.memory` to give the GC
  # an advisory target; otherwise Go's default behaviour is unbounded.
  # Leave empty to disable (zero-dep mode).
  runtime:
    gomemlimit: ""           # GOMEMLIMIT; e.g. 768MiB
    gogc: ""                 # GOGC; e.g. 100
  # NEXUS_MAX_CONCURRENT_PER_KEY caps in-flight requests per virtual key
  # on a single replica. 0 = disabled (RPM-only enforcement). Recommended
  # for production: 16–32 for shared pools, 4–8 for spotty model backends.
  maxConcurrentPerKey: 0

# --- Dependency wiring -------------------------------------------------------
# This chart does NOT deploy databases; it connects to external/managed ones
# (managed ClickHouse Cloud, an in-cluster Postgres/Redis operator, etc.).
# Set `enabled: true` and provide a connection URL. URLs contain credentials,
# so they are stored in the chart Secret (or your existingSecret).
dependencies:
  postgres:
    enabled: false
    url: "" # postgres://user:pass@host:5432/nexus?sslmode=require
  clickhouse:
    enabled: false
    url: "" # clickhouse://user:pass@host:9000/nexus
  redis:
    enabled: false
    url: "" # redis://:pass@host:6379/0

# --- Secrets -----------------------------------------------------------------
# Provide secret values here to have the chart create a Secret, OR set
# `existingSecret` to the name of a Secret you manage out-of-band (recommended
# for production). The existing Secret must use the same NEXUS_*/PROVIDER keys.
existingSecret: ""

secrets:
  openaiApiKey: ""
  anthropicApiKey: ""
  geminiApiKey: ""
  groqApiKey: ""
  mistralApiKey: ""
  gridApiKey: ""
  # 32-byte hex/base64 KEK for the encrypted credential store. Generate with
  # `openssl rand -hex 32` and PERSIST IT (needed to decrypt provider secrets).
  masterKey: ""
  judgeApiKey: ""
  embeddingsApiKey: ""
  # Bootstrap the first console admin (BYOK). Only used on first boot when the
  # org has no users yet; safe to leave set afterward. Provide both to enable.
  adminEmail: ""
  adminPassword: ""

# Escape hatch for arbitrary extra env (non-secret).
extraEnv: []
# - name: SOME_FLAG
#   value: "true"

# Mount extra env from existing ConfigMaps/Secrets.
envFrom: []
# - secretRef:
#     name: my-extra-secret

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

# The image already runs as non-root uid 65532; these harden the pod further.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

livenessProbe:
  httpGet:
    path: /healthz
    port: gateway
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: gateway
  initialDelaySeconds: 3
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

ingress:
  enabled: false
  className: ""
  annotations: {}
  # Separate Tailscale Ingress for the console (:8081). Tailscale registers one
  # MagicDNS name per Ingress resource, so gateway and console need two Ingresses.
  console:
    enabled: false
    host: console
  # Route gateway (:8080). Defaults below are examples.
  hosts:
    - host: nexus.example.com
      paths:
        - path: /
          pathType: Prefix
          port: gateway
  tls: []
  # - secretName: nexus-tls
  #   hosts:
  #     - nexus.example.com

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: null

# PodDisruptionBudget for safer node drains (Talos rolling upgrades).
podDisruptionBudget:
  enabled: false
  minAvailable: 1
