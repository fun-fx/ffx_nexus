# Local inference for SLM judge, eval sidecar, and semantic-cache embeddings.
#
#   kubectl -n tenant-nexus apply -f 04-ollama.yaml
#   kubectl -n tenant-nexus apply -f 04-ollama-models-job.yaml
#
# Ollama stores models on a PVC. The one-shot Job pulls the judge + embedding
# models after the Deployment is ready.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: tenant-nexus
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: linstor
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: tenant-nexus
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
              name: http
          env:
            - name: OLLAMA_HOST
              value: 0.0.0.0:11434
          volumeMounts:
            - name: data
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ollama-data
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: tenant-nexus
  labels:
    app: ollama
spec:
  selector:
    app: ollama
  ports:
    - name: http
      port: 11434
      targetPort: http
