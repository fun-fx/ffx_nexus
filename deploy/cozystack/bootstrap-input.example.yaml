# Optional inputs for the bootstrap Job. Copy, fill in real values, apply once:
#
#   cp bootstrap-input.example.yaml bootstrap-input.yaml
#   # edit bootstrap-input.yaml
#   kubectl -n tenant-nexus apply -f bootstrap-input.yaml
#
# If omitted, the Job still creates DSNs + master key; admin password is
# auto-generated and printed in Job logs.
apiVersion: v1
kind: Secret
metadata:
  name: nexus-bootstrap-input
  namespace: tenant-nexus
type: Opaque
stringData:
  GEMINI_API_KEY: ""
  NEXUS_ADMIN_EMAIL: admin@nexus.local
  NEXUS_ADMIN_PASSWORD: ""
