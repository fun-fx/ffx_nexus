# In-cluster image build with kaniko. Uses the standard harbor.pull secret
# already in the namespace to authenticate the push. For tag / destination
# substitution, run deploy/cozystack/kaniko-build.sh instead of applying
# this file directly — the script replaces the placeholder lines below.
#
# Manual one-shot (e.g. for a v0.3.6 release build):
#   IMAGE_TAG=0.3.6 ./deploy/cozystack/kaniko-build.sh
#
# CI-driven (cd-prod.yml) one-shot after a push to main:
#   IMAGE_TAG=main-latest ./deploy/cozystack/kaniko-build.sh
apiVersion: batch/v1
kind: Job
metadata:
  name: PLACEHOLDER_JOB_NAME
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: kaniko
          image: gcr.io/kaniko-project/executor:latest
          args:
            - --context=git://github.com/fun-fx/ffx_nexus.git#PLACEHOLDER_REVISION
            - --dockerfile=Dockerfile
            - --destination=PLACEHOLDER_DESTINATION
            - --skip-tls-verify
            - --skip-tls-verify-pull
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: docker-config
              mountPath: /kaniko/.docker
      volumes:
        - name: docker-config
          secret:
            secretName: harbor
            items:
              - key: .dockerconfigjson
                path: config.json
