# Cozystack full-stack override. Combines values-full feature flags with
# production cluster settings (Harbor image, Tailscale ingress).
#
# One-shot install (after Cozystack CRs + bootstrap Job):
#   kubectl -n tenant-nexus apply -f 06-bootstrap-secret.yaml
#   kubectl -n tenant-nexus apply -f 04-ollama.yaml
#   kubectl -n tenant-nexus apply -f 04-ollama-models-job.yaml
#   kubectl -n tenant-nexus apply -f 05-eval-service.yaml
#   helm upgrade --install nexus deploy/helm/nexus \
#     -n tenant-nexus -f deploy/cozystack/values-full.yaml
#
# Or run: ./deploy/cozystack/install-full.sh

existingSecret: nexus

image:
  repository: harbor.192.168.0.101.nip.io/ffx/nexus
  tag: "0.3.3"
imagePullSecrets:
  - name: harbor

config:
  keyMode: strict_byok

  routeGroups: "fast=gemini-2.5-flash,gemini-2.0-flash;smart=gemini-2.5-pro"
  routeWQuality: "0.6"
  routeWCost: "0.2"
  routeWLatency: "0.2"
  routeWindow: "1h"
  routeRefresh: "30s"
  routeLoadBalance: true

  guardrails:
    enabled: true
    blockPiiInput: true
    redactPiiOutput: true
    maxInputChars: 20000
    validateJsonOutput: true

  selfCorrection:
    enabled: true
    maxRetries: 1

  judge:
    baseUrl: http://ollama:11434/v1
    model: qwen2.5:7b-instruct
    sampleRate: "0.1"
    workers: "4"

  evalService:
    url: http://eval-service:8200
    metrics: answer_relevancy,toxicity,bias
    timeout: 30s

  semanticCache:
    enabled: true
    ttl: 24h
    threshold: "0.92"
    maxEntries: 500
  embeddings:
    url: http://ollama:11434/v1
    model: nomic-embed-text
    timeout: 5s

dependencies:
  clickhouse:
    enabled: true
  postgres:
    enabled: true
  redis:
    enabled: true

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 1Gi

ingress:
  enabled: true
  className: tailscale
  annotations:
    tailscale.com/proxy-class: kernel-mode
  console:
    enabled: true
    host: console
  hosts:
    - host: nexus
      paths:
        - path: /
          pathType: Prefix
          port: gateway
  tls:
    - hosts:
        - nexus
