# Managed Redis for shared rate limits / budgets and the semantic cache.
#
#   kubectl -n tenant-nexus apply -f 03-redis.yaml
#
# Connection: the auth password is published in `redis-nexus-credentials`
# (key: `password`). The service is `rfs-redis-nexus` on port 6379. Build the
# DSN as:
#   redis://:<password>@rfs-redis-nexus:6379/0
apiVersion: apps.cozystack.io/v1alpha1
kind: Redis
metadata:
  name: nexus
  namespace: tenant-nexus
spec:
  version: v7
  replicas: 1
  size: 1Gi
  storageClass: linstor
  resourcesPreset: small
  authEnabled: true
  external: false
