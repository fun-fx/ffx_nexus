# Idempotent bootstrap: build the Nexus Secret from Cozystack operator credentials.
#
# Prerequisites: Postgres, ClickHouse, and Redis CRs applied (step 3 in README).
# Optional: apply bootstrap-input.example.yaml (as bootstrap-input.yaml) first.
#
#   kubectl -n tenant-nexus apply -f 06-bootstrap-secret.yaml
#   kubectl -n tenant-nexus logs -f job/nexus-bootstrap
#
# Safe to re-run: skips when Secret `nexus` already exists.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nexus-bootstrap
  namespace: tenant-nexus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nexus-bootstrap
  namespace: tenant-nexus
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nexus-bootstrap
  namespace: tenant-nexus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nexus-bootstrap
subjects:
  - kind: ServiceAccount
    name: nexus-bootstrap
    namespace: tenant-nexus
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexus-bootstrap-script
  namespace: tenant-nexus
data:
  bootstrap.sh: |
    #!/bin/sh
    set -eu

    APISERVER="https://kubernetes.default.svc"
    TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
    CABUNDLE=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)

    SECRET_NAME="${SECRET_NAME:-nexus}"
    CH_CRED="${CH_CRED:-clickhouse-nexus-credentials}"
    PG_CRED="${PG_CRED:-postgres-nexus-credentials}"
    REDIS_AUTH="${REDIS_AUTH:-redis-nexus-auth}"
    INPUT="${INPUT:-nexus-bootstrap-input}"

    kget() {
      curl -sf --cacert "$CABUNDLE" -H "Authorization: Bearer $TOKEN" \
        "$APISERVER/api/v1/namespaces/$NS/secrets/$1"
    }

    secret_exists() {
      kget "$1" >/dev/null 2>&1
    }

    secret_data() {
      kget "$1" | sed -n "s/.*\"$2\":\"\\([^\"]*\\)\".*/\\1/p" | head -1 | base64 -d
    }

    if secret_exists "$SECRET_NAME"; then
      echo "Secret $SECRET_NAME already exists — skipping bootstrap"
      exit 0
    fi

    echo "Waiting for operator credential secrets..."
    for i in $(seq 1 60); do
      if secret_exists "$CH_CRED" && secret_exists "$PG_CRED" && secret_exists "$REDIS_AUTH"; then
        break
      fi
      sleep 5
    done
    secret_exists "$CH_CRED" && secret_exists "$PG_CRED" && secret_exists "$REDIS_AUTH"

    CH_PW=$(secret_data "$CH_CRED" nexus)
    PG_PW=$(secret_data "$PG_CRED" nexus)
    REDIS_PW=$(secret_data "$REDIS_AUTH" password)

    MASTER_KEY=$(head -c 32 /dev/urandom | od -An -tx1 | tr -d ' \n')
    ADMIN_EMAIL="admin@nexus.local"
    ADMIN_PASSWORD=$(head -c 18 /dev/urandom | base64 | tr -d '/+=' | head -c 20)

    GEMINI_KEY=""
    if secret_exists "$INPUT"; then
      GEMINI_KEY=$(secret_data "$INPUT" GEMINI_API_KEY || true)
      _email=$(secret_data "$INPUT" NEXUS_ADMIN_EMAIL || true)
      _pass=$(secret_data "$INPUT" NEXUS_ADMIN_PASSWORD || true)
      [ -n "$_email" ] && ADMIN_EMAIL="$_email"
      [ -n "$_pass" ] && ADMIN_PASSWORD="$_pass"
    fi

    CH_URL="clickhouse://nexus:${CH_PW}@chendpoint-clickhouse-nexus:9000/nexus"
    PG_URL="postgres://nexus:${PG_PW}@postgres-nexus-rw:5432/nexus?sslmode=require"
    REDIS_URL="redis://:${REDIS_PW}@rfrm-redis-nexus:6379/0"

    b64() { printf '%s' "$1" | base64 | tr -d '\n'; }

    PAYLOAD="{\"apiVersion\":\"v1\",\"kind\":\"Secret\",\"metadata\":{\"name\":\"$SECRET_NAME\",\"namespace\":\"$NS\"},\"type\":\"Opaque\",\"data\":{"
    PAYLOAD="${PAYLOAD}\"NEXUS_POSTGRES_URL\":\"$(b64 "$PG_URL")\","
    PAYLOAD="${PAYLOAD}\"NEXUS_CLICKHOUSE_URL\":\"$(b64 "$CH_URL")\","
    PAYLOAD="${PAYLOAD}\"NEXUS_REDIS_URL\":\"$(b64 "$REDIS_URL")\","
    PAYLOAD="${PAYLOAD}\"NEXUS_MASTER_KEY\":\"$(b64 "$MASTER_KEY")\","
    PAYLOAD="${PAYLOAD}\"NEXUS_ADMIN_EMAIL\":\"$(b64 "$ADMIN_EMAIL")\","
    PAYLOAD="${PAYLOAD}\"NEXUS_ADMIN_PASSWORD\":\"$(b64 "$ADMIN_PASSWORD")\""
    if [ -n "$GEMINI_KEY" ]; then
      PAYLOAD="${PAYLOAD},\"GEMINI_API_KEY\":\"$(b64 "$GEMINI_KEY")\""
    fi
    PAYLOAD="${PAYLOAD}}}"

    echo "Creating Secret $SECRET_NAME..."
    code=$(curl -s -o /tmp/out -w "%{http_code}" --cacert "$CABUNDLE" \
      -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
      -X POST "$APISERVER/api/v1/namespaces/$NS/secrets" -d "$PAYLOAD")
    if [ "$code" != "201" ]; then
      echo "create secret failed: HTTP $code"
      cat /tmp/out
      exit 1
    fi

    echo "Bootstrap complete."
    echo "  admin email:    $ADMIN_EMAIL"
    echo "  admin password: $ADMIN_PASSWORD"
    echo "  master key:     (stored in $SECRET_NAME — persist it for credential decryption)"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: nexus-bootstrap
  namespace: tenant-nexus
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      serviceAccountName: nexus-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: curlimages/curl:8.12.1
          command: ["/bin/sh", "/scripts/bootstrap.sh"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: nexus-bootstrap-script
            defaultMode: 0755
