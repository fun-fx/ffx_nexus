# Managed ClickHouse for Nexus trace + eval persistence.
#
#   kubectl -n tenant-nexus apply -f 01-clickhouse.yaml
#
# Nexus uses only non-replicated MergeTree tables, so ClickHouse Keeper is NOT
# required. On a single-node cluster Keeper cannot form a 3-node Raft quorum and
# crash-loops, so it is disabled here. Enable it only on multi-node clusters that
# need ReplicatedMergeTree.
#
# Connection: the operator publishes credentials in the secret
# `clickhouse-nexus-credentials` (key: `nexus`). The native-protocol endpoint is
# `chendpoint-clickhouse-nexus:9000`. Build the DSN for Nexus as:
#   clickhouse://nexus:<password>@chendpoint-clickhouse-nexus:9000/nexus
apiVersion: apps.cozystack.io/v1alpha1
kind: ClickHouse
metadata:
  name: nexus
  namespace: tenant-nexus
spec:
  replicas: 1
  shards: 1
  size: 10Gi
  storageClass: linstor
  resourcesPreset: small
  logStorageSize: 2Gi
  logTTL: 15
  clickhouseKeeper:
    enabled: false
    replicas: 1
    resourcesPreset: micro
    size: 1Gi
  users:
    nexus:
      # Replace with a strong password (or manage out-of-band). The operator
      # mirrors this into the `clickhouse-nexus-credentials` secret.
      password: CHANGEME-clickhouse-password
      readonly: false
  backup:
    enabled: false
