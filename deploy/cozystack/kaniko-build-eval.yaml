# In-cluster build for the Python eval sidecar.
#
#   kubectl -n tenant-nexus apply -f kaniko-build-eval.yaml
#   kubectl -n tenant-nexus logs -f job/nexus-eval-build
apiVersion: batch/v1
kind: Job
metadata:
  name: nexus-eval-build
  namespace: tenant-nexus
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: kaniko
          image: gcr.io/kaniko-project/executor:latest
          args:
            - --context=git://github.com/fun-fx/ffx_nexus.git#refs/heads/main
            - --context-sub-path=eval-service
            - --dockerfile=Dockerfile
            - --destination=harbor.<node-ip>.nip.io/ffx/nexus-eval:0.3.2
            - --skip-tls-verify
            - --skip-tls-verify-pull
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: docker-config
              mountPath: /kaniko/.docker
      volumes:
        - name: docker-config
          secret:
            secretName: harbor
            items:
              - key: .dockerconfigjson
                path: config.json
