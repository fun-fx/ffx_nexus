# Helm values override for deploying Nexus on Talos + Cozystack.
#
#   helm upgrade --install nexus deploy/helm/nexus \
#     -n tenant-nexus \
#     -f deploy/cozystack/values-prod.yaml
#
# Secrets and datastore DSNs live in the cluster Secret `nexus` (created on first
# deploy from the Cozystack operator credentials — see README.md). Pointing
# existingSecret at it prevents `helm upgrade -f values-prod.yaml` from
# overwriting live credentials with placeholders.
existingSecret: nexus

image:
  # Use the Tailscale MagicDNS name so the kubelet can pull without
  # having to trust the self-signed Harbor cert (the in-cluster
  # containerd trusts the Tailscale cert chain). The image pushed
  # to this registry is linux/amd64 (Talos nodes are amd64); the
  # local Mac arm64 build is **not** what the cluster can run.
  #
  # Tag strategy: floating `main-latest` rebuilt by cd-prod.yml on every
  # push to main. This keeps CD single-click: a `git push origin main`
  # rolls out. Tagged releases (v0.3.6, v0.3.7, ...) are still built by the
  # same kaniko script — operators run `IMAGE_TAG=vX.Y.Z ./deploy/cozystack/
  # kaniko-build.sh` then bump image.tag here to that semver. Older tags
  # do not have to be rebuilt at every release.
  repository: harbor.<tailnet>.ts.net/ffx/nexus
  tag: main-latest
imagePullSecrets:
  - name: harbor

# Strict BYOK: every caller must register their own upstream provider key.
# No org/env fallback — operator GEMINI_API_KEY must not be in the Secret.
config:
  keyMode: strict_byok
  allowSignup: true

  # Quality-aware routing (Phase 4). Models must exist for the caller/org.
  routeGroups: "fast=gemini-2.5-flash,gemini-2.0-flash;smart=gemini-2.5-pro"
  routeWQuality: "0.6"
  routeWCost: "0.2"
  routeWLatency: "0.2"
  routeWindow: "1h"
  routeRefresh: "30s"
  routeLoadBalance: true

  # Inline guardrails (hot path).
  guardrails:
    enabled: true
    blockPiiInput: true
    redactPiiOutput: true
    maxInputChars: 20000
    validateJsonOutput: true

  selfCorrection:
    enabled: true
    maxRetries: 1

  # Local SLM judge via in-cluster Ollama (deploy/cozystack/04-ollama.yaml).
  judge:
    baseUrl: http://ollama:11434/v1
    model: qwen2.5:7b-instruct
    sampleRate: "0.1"
    workers: "4"

  # Python eval sidecar (deploy/cozystack/05-eval-service.yaml).
  evalService:
    url: http://eval-service:8200
    metrics: answer_relevancy,toxicity,bias
    timeout: 30s

  # Semantic cache (Redis + Ollama embeddings).
  semanticCache:
    enabled: true
    ttl: 24h
    threshold: "0.92"
    maxEntries: 500
  embeddings:
    url: http://ollama:11434/v1
    model: nomic-embed-text
    timeout: 5s

# Managed backing services provisioned by the Cozystack CRs in this directory.
# DSNs are stored in existingSecret (NEXUS_*_URL keys), not in this file.
dependencies:
  clickhouse:
    enabled: true
  postgres:
    enabled: true
  redis:
    enabled: true

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 1Gi

# Expose gateway and console via Tailscale ingress.
# Both are protected by Tailscale auth; only authenticated users can reach them.
ingress:
  enabled: true
  className: tailscale
  annotations:
    tailscale.com/proxy-class: kernel-mode
  console:
    enabled: true
    host: console
  hosts:
    - host: nexus
      paths:
        - path: /
          pathType: Prefix
          port: gateway
  tls:
    - hosts:
        - nexus
