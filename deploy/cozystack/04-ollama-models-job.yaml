# Pulls judge + embedding models into the Ollama PVC. Re-run after upgrades.
#
#   kubectl -n tenant-nexus delete job ollama-pull-models --ignore-not-found
#   kubectl -n tenant-nexus apply -f 04-ollama-models-job.yaml
#   kubectl -n tenant-nexus logs -f job/ollama-pull-models
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-pull-models
  namespace: tenant-nexus
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: pull
          image: curlimages/curl:8.12.1
          command:
            - /bin/sh
            - -ec
            - |
              OLLAMA=http://ollama:11434
              echo "waiting for ollama..."
              until curl -sf "$OLLAMA/" >/dev/null; do sleep 5; done
              for model in qwen2.5:7b-instruct nomic-embed-text; do
                echo "pulling $model..."
                curl -sf -X POST "$OLLAMA/api/pull" -d "{\"name\":\"$model\"}"
                echo
              done
              echo "done"
